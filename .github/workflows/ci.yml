name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        run: |
          pip install flake8 black isort
          npm install -g prettier

      - name: Black check
        run: black --check --line-length=110 rentpro/

      - name: isort check
        run: isort --check-only --profile=black --line-length=110 rentpro/

      - name: Flake8
        run: flake8 rentpro/ --max-line-length=110 --extend-ignore=E203,W503

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    services:
      mariadb:
        image: mariadb:10.6
        ports:
          - 3306:3306
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: _test_database
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis-cache:
        image: redis:6
        ports:
          - 13000:6379
      redis-queue:
        image: redis:6
        ports:
          - 13001:6379
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install bench
        run: |
          pip install frappe-bench
          bench init --frappe-path $GITHUB_WORKSPACE/../frappe frappe-bench
          bench set-config redis_cache "redis://127.0.0.1:13000"
          bench set-config redis_queue "redis://127.0.0.1:13001"
        working-directory: /home/runner

      - name: Install ERPNext
        run: |
          bench get-app erpnext --branch version-15
          bench --site test.localhost install-app erpnext
        working-directory: /home/runner/frappe-bench

      - name: Install Rent Pro
        run: |
          ln -s $GITHUB_WORKSPACE apps/rentpro
          bench --site test.localhost install-app rentpro
        working-directory: /home/runner/frappe-bench

      - name: Run tests
        run: |
          bench --site test.localhost run-tests --app rentpro --coverage
        working-directory: /home/runner/frappe-bench

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./frappe-bench/.coverage
          fail_ci_if_error: false

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install bench
        run: |
          pip install frappe-bench
          bench init --skip-redis-config-generation frappe-bench
        working-directory: /home/runner

      - name: Build assets
        run: |
          ln -s $GITHUB_WORKSPACE apps/rentpro
          bench build --app rentpro
        working-directory: /home/runner/frappe-bench
